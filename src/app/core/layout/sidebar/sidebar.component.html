<div class="sidebar">

  <div class="sidebar-header">
    <div class="logo-icon">
      <mat-icon>storefront</mat-icon>
    </div>
    <div class="logo-text">
      <h2>ShopHub</h2>
      <span>Admin panel</span>
    </div>
  </div>

  <nav>

    <p class="nav-section-label">Overview</p>

    <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </a>

    <p class="nav-section-label">Catalog</p>

    <a routerLink="/admin/products" routerLinkActive="active">
      <mat-icon>inventory_2</mat-icon>
      <span>Products</span>
    </a>

    <a routerLink="/admin/categories" routerLinkActive="active">
      <mat-icon>category</mat-icon>
      <span>Categories</span>
    </a>

    <p class="nav-section-label">Sales</p>

    <a routerLink="/admin/orders" routerLinkActive="active">
      <mat-icon>shopping_bag</mat-icon>
      <span>Orders</span>
    </a>

    <p class="nav-section-label">Insights</p>

    <a routerLink="/admin/reports" routerLinkActive="active">
      <mat-icon>bar_chart</mat-icon>
      <span>Reports</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <a routerLink="/">
      <mat-icon>storefront</mat-icon>
      <span>Go to Store</span>
    </a>

    <a class="logout-link" role="button" tabindex="0" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </a>
  </div>

</div>
